<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Admin Dashboard</h1>

<h2>Create New Event</h2>

<input type="text" id="event_name" placeholder="Event Name">
<input type="date" id="event_date">
<input type="text" id="venue" placeholder="Venue">
<input type="number" id="capacity" placeholder="Capacity">

<button onclick="addEvent()">Create Event</button>

<p id="message"></p>

<h2>All Events</h2>
<div id="events"></div>

<hr>
<button onclick="logout()">Logout</button>

<script>
async function loadEvents() {
  const response = await fetch("http://localhost:3000/api/events");
  const events = await response.json();

  let html = "";

  events.forEach(event => {
    const percent = Math.round((event.registered_count / event.capacity) * 100);

    let colorClass = "green";
    if (percent >= 80) {
      colorClass = "red";
    } else if (percent >= 50) {
      colorClass = "amber";
    }

    const formattedDate = event.event_date.split("T")[0];

    html += `
      <div class="event-card">
        <h3>${event.event_name}</h3>
        <p>Date: ${formattedDate}</p>
        <p>Venue: ${event.venue}</p>
        <p>Registered: ${event.registered_count}/${event.capacity}</p>
        <p class="${colorClass}">Fill Percentage: ${percent}%</p>

        <button onclick="viewRegistrations(${event.id})">
          View Registrations
        </button>

        <button onclick="deleteEvent(${event.id})">
          Delete Event
        </button>

        <div id="registrations-${event.id}"></div>
      </div>
    `;
  });

  document.getElementById("events").innerHTML = html;
}

async function viewRegistrations(eventId) {
  const response = await fetch(
    `http://localhost:3000/api/events/${eventId}/registrations`
  );

  const students = await response.json();

  let html = "<h4>Registered Students</h4>";

  if (students.length === 0) {
    html += "<p>No students registered yet.</p>";
  } else {
    students.forEach(student => {
      html += `<p>👤 ${student.name} (${student.username})</p>`;
    });
  }

  document.getElementById(`registrations-${eventId}`).innerHTML = html;
}

async function addEvent() {
  const event_name = document.getElementById("event_name").value;
  const event_date = document.getElementById("event_date").value;
  const venue = document.getElementById("venue").value;
  const capacity = document.getElementById("capacity").value;
  const message = document.getElementById("message");

  message.textContent = "Creating event...";

  try {
    const response = await fetch("http://localhost:3000/api/events", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ event_name, event_date, venue, capacity })
    });

    const data = await response.json();
    message.textContent = data.message;

    document.getElementById("event_name").value = "";
    document.getElementById("event_date").value = "";
    document.getElementById("venue").value = "";
    document.getElementById("capacity").value = "";

    loadEvents();
  } catch (error) {
    message.textContent = "Could not create event.";
  }
}

async function deleteEvent(id) {
  const confirmDelete = confirm("Are you sure you want to delete this event?");

  if (!confirmDelete) {
    return;
  }

  const response = await fetch(`http://localhost:3000/api/events/${id}`, {
    method: "DELETE"
  });

  const data = await response.json();
  alert(data.message);

  loadEvents();
}

function logout() {
  localStorage.clear();
  window.location.href = "login.html";
}

loadEvents();
</script>

</body>
</html>
